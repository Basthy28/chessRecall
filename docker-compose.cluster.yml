# ─────────────────────────────────────────────────────────────────────────────
# Oracle A1.flex cluster — Redis + deep analysis worker
#
# SETUP:
#   1. Copy files to cluster:
#        scp -r src/ package*.json tsconfig*.json Dockerfile.worker \
#               docker-compose.cluster.yml  user@<oracle-ip>:~/chess-recall/
#   2. Create .env on the cluster (see env section below)
#   3. Open port 6379 in Oracle Cloud security list (restrict to your IP)
#   4. docker compose -f docker-compose.cluster.yml up -d --build
#
# LOCAL APP:
#   Set in .env.local:
#        REDIS_HOST=<oracle-ip>
#        REDIS_PORT=6379
#        REDIS_PASSWORD=<strong-password>   ← same as REDIS_PASSWORD below
# ─────────────────────────────────────────────────────────────────────────────

services:
  redis:
    image: redis:7-alpine
    container_name: chess-recall-redis
    ports:
      - "0.0.0.0:6379:6379"   # exposed so the local app can queue jobs
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env or pass --env-file}"   # set a strong password in .env
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env or pass --env-file}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: chess-recall-worker
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    environment:
      # ── Engine: native binary, all 4 Ampere cores, 4 GB hash ─────────────
      ENGINE_MODE: "native"
      STOCKFISH_THREADS: "4"
      STOCKFISH_HASH_MB: "4096"
      # movetime 2000 = 2 s per position → ~80 s per 40-move game
      # depth is ignored when STOCKFISH_MOVETIME_MS > 0
      STOCKFISH_MOVETIME_MS: "2000"

      # ── Redis (internal Docker network) ───────────────────────────────────
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env or pass --env-file}"

      # ── Supabase ──────────────────────────────────────────────────────────
      NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL}"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 20G

volumes:
  redis_data:
